name: Release

# Fires when you push a version tag, e.g.  git tag v1.0 && git push origin v1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release and upload the APK
  pages: write      # publish the install page
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing. Run make-keystore.sh and add the 4 secrets."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease --no-daemon --stacktrace
          cp app/build/outputs/apk/release/app-release.apk PrestonsPlayer.apk

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: PrestonsPlayer.apk
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Assemble install page
        run: |
          mkdir -p _site
          cp install-page/index.html _site/index.html
          # Ship the APK next to the page so the "Download APK" button (href="./PrestonsPlayer.apk") works.
          cp PrestonsPlayer.apk _site/PrestonsPlayer.apk

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy install page
        id: deployment
        uses: actions/deploy-pages@v4
